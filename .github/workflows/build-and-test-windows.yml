name: build-and-test-windows
'on':
  push:
    branches:
    - main
    - releases/**
    tags:
    - v[0-9]+.[0-9]+.[0-9]+*
  merge_group: null
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    - labeled
    - unlabeled
    branches:
    - main
env:
  TEST_RESULTS: testbed/tests/results/junit/results.xml
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 2
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
permissions: read-all
jobs:
  setup-environment:
    if: ${{ github.actor != 'dependabot[bot]' && (contains(github.event.pull_request.labels.*.name,
      'Run Windows') || github.event_name == 'push' || github.event_name == 'merge_group')
      }}
    strategy:
      fail-fast: true
      matrix:
        os:
        - windows-latest
        - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
    - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
      id: go-setup
      with:
        go-version: oldstable
        cache-dependency-path: '**/*.sum'
    - name: Install dependencies
      if: steps.go-setup.outputs.cache-hit != 'true'
      run: make -j2 gomoddownload
    - name: Install Tools
      if: steps.go-setup.outputs.cache-hit != 'true'
      run: make install-tools
  windows-smoke-build:
    needs:
    - setup-environment
    strategy:
      fail-fast: true
      matrix:
        os:
        - windows-latest
        - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
    - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
      id: go-setup
      with:
        go-version: oldstable
        cache-dependency-path: '**/*.sum'
    - name: Install dependencies
      if: steps.go-setup.outputs.cache-hit != 'true'
      run: make -j2 gomoddownload
    - name: Install Tools
      if: steps.go-setup.outputs.cache-hit != 'true'
      run: make install-tools
    - name: Generate otelcontribcol files
      run: make genotelcontribcol
    - name: Build Collector
      run: make otelcontribcol
  windows-unittest-matrix:
    needs:
    - setup-environment
    strategy:
      fail-fast: false
      matrix:
        group:
        - receiver-0
        - receiver-1
        - receiver-2
        - receiver-3
        - processor-0
        - processor-1
        - exporter-0
        - exporter-1
        - exporter-2
        - exporter-3
        - extension
        - connector
        - internal
        - pkg
        - cmd-0
        - other
        os:
        - windows-2022
        - windows-2025
    runs-on: ${{ matrix.os }}
    if: ${{ github.actor != 'dependabot[bot]' && (contains(github.event.pull_request.labels.*.name,
      'Run Windows') || github.event_name == 'push' || github.event_name == 'merge_group')
      }}
    env:
      GOGC: 50
      GOMEMLIMIT: 2GiB
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
    - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
      id: go-setup
      with:
        go-version: oldstable
        cache-dependency-path: '**/*.sum'
    - name: Ensure required ports in the dynamic range are available
      run: '& ${{ github.workspace }}\.github\workflows\scripts\win-required-ports.ps1

        '
    - name: Build shared test tools
      run: make "$(${PWD} -replace '\\', '/')/.tools/gotestsum"
    - name: Run Unit Tests
      id: tests
      if: github.ref != 'refs/heads/main'
      run: make -j2 gotest GROUP=${{ matrix.group }}
    - name: Run Unit Tests With JUnit and Coverage
      id: tests-with-junit
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      continue-on-error: true
      run: make gotest-with-junit-and-cover GROUP=${{ matrix.group }}
    - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      with:
        name: test-results-windows-${{ matrix.os }}-${{ matrix.group }}
        path: internal/tools/testresults/
        retention-days: 4
    - name: Fail workflow if tests fails
      if: always()
      shell: bash
      run: "if [[ \"${{ steps.tests-with-junit.outcome }}\" == \"failure\" || \"${{\
        \ steps.tests.outcome }}\" == \"failure\" ]]; then\n  echo \"Tests failed.\
        \ Failing workflow.\"\n  exit 1\nelse\n  echo \"Tests passed or were skipped.\
        \ Continuing.\"\nfi\n"
  windows-unittest:
    if: ${{ github.actor != 'dependabot[bot]' && (contains(github.event.pull_request.labels.*.name,
      'Run Windows') || github.event_name == 'push' || github.event_name == 'merge_group')
      }}
    runs-on: windows-latest
    needs:
    - windows-unittest-matrix
    steps:
    - name: Print result
      run: echo ${{ needs.windows-unittest-matrix.result }}
    - name: Interpret result
      shell: bash
      run: "if [[ success == ${{ needs.windows-unittest-matrix.result }} ]]\nthen\n\
        \  echo \"All matrix jobs passed!\"\nelse\n  echo \"One or more matrix jobs\
        \ failed.\"\n  false\nfi\n"
  flakytests-generate-issues:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        os:
        - windows-2022
        - windows-2025
    runs-on: ubuntu-24.04
    needs:
    - windows-unittest-matrix
    permissions:
      issues: write
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
    - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
      id: go-setup
      with:
        go-version: oldstable
        cache-dependency-path: '**/*.sum'
    - name: Install dependencies
      if: steps.go-setup.outputs.cache-hit != 'true'
      run: make -j2 gomoddownload
    - name: Install Tools
      if: steps.go-setup.outputs.cache-hit != 'true'
      run: make install-tools
    - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
      with:
        merge-multiple: true
        pattern: test-results-windows-${{ matrix.os }}-*
        path: ./internal/tools/testresults/
    - name: Generate Issues
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: 'make install-tools

        ./.tools/issuegenerator -path ./internal/tools/testresults/

        '
